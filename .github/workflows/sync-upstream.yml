name: Sync from upstream
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork from sovrynn/ecdo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh repo sync Bobby-Axelr0d/ecdo --source sovrynn/ecdo --force